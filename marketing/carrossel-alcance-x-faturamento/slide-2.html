<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>FortGrow — Carrossel Alcance x Faturamento — Slide 2</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .content { position: absolute; inset: 0; padding: 178px 84px 100px; z-index: 20; }
  .content .h1 { font-size: 96px; }
  .content .lead { margin-top: 44px; max-width: 800px; font-size: 31px; }

  .metrics { margin-top: 46px; }
  .metrics .kicker { margin-bottom: 6px; }
  .metrics .icon-row { max-width: 800px; padding: 25px 8px; }
  .metrics .icon-row .ico { width: 76px; height: 76px; }
  .metrics .icon-row .ico svg { width: 38px; height: 38px; }
  .metrics .icon-row .txt { font-size: 29px; }

  .bottom-card {
    position: absolute;
    left: 84px;
    right: 84px;
    bottom: 84px;
  }
  .bottom-card.alert-bar { padding: 34px 44px; }
</style>
</head>
<body>
<div class="slide">
  <img class="bg-watermark" src="./assets/fg-mark.png" alt="">
  <img class="bg-tactics" src="./assets/tactics.svg" alt="">
  <div class="bg-grid-light"></div>
  <div class="flare a"></div>
  <div class="flare c"></div>

  <div class="topbar">
    <div></div>
    <div class="badge"><img src="./assets/fg-mark.png" alt=""></div>
  </div>

  <div class="content">
    <div class="h1">
      CURTIDAS<br>
      <span class="chip">NÃO SÃO</span><br>
      FATURAMENTO.
    </div>
    <div class="brush"></div>

    <div class="lead body-lg">
      Ter milhares de visualizações <span class="strong">não significa</span>
      que sua empresa está <span class="blue">crescendo</span>.
    </div>

    <div class="metrics">
      <div class="kicker">O que realmente importa é:</div>

      <div class="icon-row">
        <div class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
        <div class="txt">Quantos <span class="blue">leads</span> chegaram?</div>
      </div>

      <div class="icon-row">
        <div class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            <path d="m9 16 2 2 4-4"/>
          </svg>
        </div>
        <div class="txt">Quantas <span class="blue">reuniões</span> foram agendadas?</div>
      </div>

      <div class="icon-row">
        <div class="ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="txt">Quantas <span class="blue">vendas</span> aconteceram?</div>
      </div>
    </div>
  </div>

  <div class="bottom-card card alert-bar">
    <svg width="84" height="84" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <div class="divider"></div>
    <div class="txt">
      Sem conversão, alcance é só <span class="strong">audiência</span> —
      <span class="blue">não é crescimento</span>.
    </div>
  </div>
</div>
</body>
</html>
