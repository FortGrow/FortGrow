<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" fill="none">
  <defs>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cfe2ff" stop-opacity=".9"/>
      <stop offset="35%" stop-color="#7fb0ff" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#3b82f8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- halos grandes dos refletores -->
  <circle cx="180" cy="90" r="190" fill="url(#halo)" opacity=".8"/>
  <circle cx="560" cy="40" r="230" fill="url(#halo)" opacity=".65"/>
  <circle cx="930" cy="120" r="200" fill="url(#halo)" opacity=".75"/>

  <!-- torres de refletores: grades de pontos de luz -->
  <g fill="#e8f1ff" filter="url(#soft)">
    <g opacity=".95">
      <circle cx="120" cy="70" r="7"/><circle cx="152" cy="66" r="7"/><circle cx="184" cy="62" r="7"/><circle cx="216" cy="58" r="7"/>
      <circle cx="126" cy="100" r="7"/><circle cx="158" cy="96" r="7"/><circle cx="190" cy="92" r="7"/><circle cx="222" cy="88" r="7"/>
    </g>
    <g opacity=".85">
      <circle cx="500" cy="26" r="6"/><circle cx="528" cy="22" r="6"/><circle cx="556" cy="20" r="6"/><circle cx="584" cy="22" r="6"/><circle cx="612" cy="26" r="6"/>
      <circle cx="504" cy="52" r="6"/><circle cx="532" cy="48" r="6"/><circle cx="560" cy="46" r="6"/><circle cx="588" cy="48" r="6"/><circle cx="616" cy="52" r="6"/>
    </g>
    <g opacity=".9">
      <circle cx="866" cy="96" r="7"/><circle cx="898" cy="92" r="7"/><circle cx="930" cy="90" r="7"/><circle cx="962" cy="92" r="7"/>
      <circle cx="872" cy="126" r="7"/><circle cx="904" cy="122" r="7"/><circle cx="936" cy="120" r="7"/><circle cx="968" cy="122" r="7"/>
    </g>
  </g>

  <!-- brilhos fortes por trás das torres -->
  <g fill="#dcebff" filter="url(#glow)">
    <circle cx="170" cy="82" r="26"/>
    <circle cx="558" cy="36" r="30"/>
    <circle cx="918" cy="106" r="26"/>
  </g>

  <!-- flares soltos -->
  <g fill="#cfe2ff" filter="url(#soft)">
    <circle cx="352" cy="180" r="4" opacity=".8"/>
    <circle cx="700" cy="150" r="5" opacity=".7"/>
    <circle cx="806" cy="250" r="3.5" opacity=".6"/>
    <circle cx="260" cy="270" r="3" opacity=".55"/>
    <circle cx="1006" cy="300" r="4" opacity=".6"/>
  </g>
</svg>
