<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>FortGrow — Carrossel Alcance x Faturamento — Slide 4</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .content { position: absolute; inset: 0; padding: 188px 84px 100px; z-index: 20; }
  .content .h1 { font-size: 96px; }

  .lead { margin-top: 46px; max-width: 820px; font-size: 31px; }

  .checklist {
    margin-top: 46px;
    padding: 46px 56px;
    max-width: 760px;
  }
  .checklist .check-item { padding: 21px 0; border-bottom: 1px solid var(--hairline); font-size: 30px; }
  .checklist .check-item:first-child { padding-top: 0; }
  .checklist .check-item:last-child { border-bottom: none; padding-bottom: 0; }

  .trophy-card {
    position: absolute;
    left: 84px;
    right: 84px;
    bottom: 84px;
    display: flex;
    align-items: center;
    gap: 40px;
    padding: 38px 52px;
  }
  .trophy-card .t-ico {
    flex: 0 0 auto;
    width: 108px;
    height: 108px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(61, 134, 255, 0.35), rgba(10, 26, 56, 0.9));
    border: 1.5px solid var(--card-line);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .trophy-card .divider { width: 2px; align-self: stretch; background: var(--hairline); }
  .trophy-card .txt {
    font-family: "Anton", sans-serif;
    font-size: 52px;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .trophy-card .txt .blue { color: var(--blue-bright); }
</style>
</head>
<body>
<div class="slide">
  <img class="bg-watermark" src="./assets/fg-mark.png" alt="">
  <img class="bg-stadium" src="./assets/stadium.svg" alt="" style="opacity:.7;">
  <img class="bg-tactics" src="./assets/tactics.svg" alt="" style="opacity:.3;">
  <div class="bg-grid-light"></div>
  <div class="flare a"></div>
  <div class="flare c"></div>

  <div class="topbar">
    <div></div>
    <div class="badge"><img src="./assets/fg-mark.png" alt=""></div>
  </div>

  <div class="content">
    <div class="h1">
      ANTES DO CONTEÚDO,<br>
      VEM A <span class="blue">ESTRATÉGIA.</span>
    </div>
    <div class="brush"></div>

    <div class="lead body-lg">
      Quem cresce de forma <span class="strong">consistente</span> possui:
    </div>

    <div class="checklist card">
      <div class="check-item">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" fill="rgba(30,107,240,0.16)"/><path d="m8.5 12.2 2.4 2.4 4.8-5"/>
        </svg>
        Posicionamento.
      </div>
      <div class="check-item">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" fill="rgba(30,107,240,0.16)"/><path d="m8.5 12.2 2.4 2.4 4.8-5"/>
        </svg>
        Oferta clara.
      </div>
      <div class="check-item">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" fill="rgba(30,107,240,0.16)"/><path d="m8.5 12.2 2.4 2.4 4.8-5"/>
        </svg>
        Processo comercial.
      </div>
      <div class="check-item">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" fill="rgba(30,107,240,0.16)"/><path d="m8.5 12.2 2.4 2.4 4.8-5"/>
        </svg>
        Conteúdo estratégico.
      </div>
      <div class="check-item">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" fill="rgba(30,107,240,0.16)"/><path d="m8.5 12.2 2.4 2.4 4.8-5"/>
        </svg>
        Conversão.
      </div>
    </div>
  </div>

  <div class="trophy-card card">
    <div class="t-ico">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#3d86ff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
      </svg>
    </div>
    <div class="divider"></div>
    <div class="txt">Likes são<br><span class="blue">consequência.</span></div>
  </div>
</div>
</body>
</html>
