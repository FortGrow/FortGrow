# Blueprint do Render — https://render.com/docs/blueprint-spec
# Deploy em 1 clique: https://render.com/deploy?repo=https://github.com/FortGrow/FortGrow
services:
  - type: web
    name: fortgrow-crm
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build && npx prisma db push
    startCommand: npm start
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fortgrow-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
    disk:
      name: fortgrow-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

databases:
  - name: fortgrow-db
    plan: basic-256mb
    databaseName: fortgrow
    user: fortgrow
